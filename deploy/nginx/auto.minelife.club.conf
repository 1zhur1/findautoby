# FindAuto — nginx для auto.minelife.club
# Фронтенд: 127.0.0.1:3013 (vite preview / serve dist)
# Бэкенд API: 127.0.0.1:4245 (Node/Express)
#
# Разместить: /etc/nginx/sites-available/auto.minelife.club.conf
# Включить:   ln -s /etc/nginx/sites-available/auto.minelife.club.conf /etc/nginx/sites-enabled/

# --- HTTP: ACME-челлендж + редирект на HTTPS ---
server {
    listen 80;
    listen [::]:80;
    server_name auto.minelife.club;

    # Для выпуска/продления сертификата через webroot
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# --- HTTPS ---
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name auto.minelife.club;

    # Сертификаты Let's Encrypt (создаются certbot — см. deploy/README.md)
    ssl_certificate     /etc/letsencrypt/live/auto.minelife.club/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/auto.minelife.club/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Сжатие статики
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    client_max_body_size 10m;

    # API → бэкенд на 4245
    location /api/ {
        proxy_pass http://127.0.0.1:4245;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Парсинг площадок бывает медленным (Onliner до 10 страниц)
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # Фронтенд → vite preview на 3013
    location / {
        proxy_pass http://127.0.0.1:3013;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Альтернатива: раздавать собранный фронт статикой напрямую (быстрее, порт 3013 не нужен) ---
    # root /var/www/findautoby/dist;
    # index index.html;
    # location / {
    #     try_files $uri $uri/ /index.html;   # SPA-роутинг (react-router)
    # }
}
