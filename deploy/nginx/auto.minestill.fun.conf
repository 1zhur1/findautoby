# FindAuto — nginx для auto.minestill.fun (домен за Cloudflare)
# Фронтенд: 127.0.0.1:3013 (vite preview) · API: 127.0.0.1:4245 (Node/Express)
#
# SSL: Cloudflare Origin Certificate (см. deploy/README.md), режим Cloudflare = Full (strict).
# Разместить: /etc/nginx/sites-available/auto.minestill.fun.conf
# Включить:   ln -s ../sites-available/auto.minestill.fun.conf /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name auto.minestill.fun;
    # Cloudflare и так редиректит на HTTPS; дублируем на origin.
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name auto.minestill.fun;

    # Cloudflare Origin Certificate (15 лет, выпускается в дашборде Cloudflare)
    ssl_certificate     /etc/nginx/ssl/minestill-origin.pem;
    ssl_certificate_key /etc/nginx/ssl/minestill-origin.key;

    # (опционально) восстановить реальные IP клиентов из Cloudflare:
    # см. https://www.cloudflare.com/ips/  → set_real_ip_from <диапазоны>;
    # real_ip_header CF-Connecting-IP;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    client_max_body_size 10m;

    # API → бэкенд на 4245
    location /api/ {
        proxy_pass http://127.0.0.1:4245;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;   # парсинг площадок бывает медленным
        proxy_connect_timeout 10s;
    }

    # Фронтенд → vite preview на 3013
    location / {
        proxy_pass http://127.0.0.1:3013;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Альтернатива: раздавать собранный фронт статикой (порт 3013 не нужен) ---
    # root /var/www/findautoby/dist;
    # index index.html;
    # location / { try_files $uri $uri/ /index.html; }
}
